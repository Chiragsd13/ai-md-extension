<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Pure AMOLED black background -->
  <rect width="128" height="128" rx="20" fill="#000000"/>

  <!-- Subtle grid lines (very dim, almost invisible) -->
  <line x1="0" y1="64" x2="128" y2="64" stroke="#111" stroke-width="0.5"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#111" stroke-width="0.5"/>

  <!-- @ symbol — monochrome white -->
  <text x="64" y="56"
        font-family="'Courier New', Courier, monospace"
        font-size="44"
        font-weight="700"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#ffffff"
        letter-spacing="-2">@</text>

  <!-- ai.md label — slightly smaller, pure white -->
  <text x="64" y="92"
        font-family="'Courier New', Courier, monospace"
        font-size="22"
        font-weight="700"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#ffffff"
        letter-spacing="1">ai.md</text>

  <!-- Small sync indicator dot — white -->
  <circle cx="104" cy="18" r="6" fill="#ffffff"/>
  <circle cx="104" cy="18" r="3" fill="#000000"/>
</svg>
